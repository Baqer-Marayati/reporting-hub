name: Validate Structure

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run structure validation
        shell: pwsh
        run: ./scripts/validate-structure.ps1 -RepoRoot "${{ github.workspace }}"
